name: ci
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'adopt'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            rawbpf/bin/jextract-22
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang-19 libbpf-dev linux-tools-common linux-tools-$(uname -r) gcc-multilib

      - name: Install reactor prerequisites (annotations + bpf-processor)
        run: ./mvnw -ntp -B install -DskipTests -N && ./mvnw -ntp -B install -DskipTests -pl annotations,shared,bpf-processor

      - name: Install bpf-runtime
        run: ./mvnw -ntp -B install -DskipTests -f bpf-runtime/pom.xml -Dmaven.compiler.proc=none
        env:
          # bpf-runtime has ~1000 generated files; JDK 22 javac hits OOM/StackOverflow
          # without extra heap and stack. Disable annotation processing (-proc:none)
          # since bpf-runtime sources are pre-generated and don't need it.
          MAVEN_OPTS: "-Xss8m -Xmx4g"

      - name: Install rawbpf
        run: ./mvnw -ntp -B install -DskipTests -f rawbpf/pom.xml

      - name: mvn package
        run: ./mvnw -ntp -B package -DskipTests

      - name: upload bpf/target/bpf.jar
        uses: actions/upload-artifact@v4
        with:
          name: bpf.jar
          path: bpf/target/bpf.jar

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-based versioning in mkdocs

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install mkdocs-material
        run: pip install -r docs-requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

  vm-test:
    # Runs on a self-hosted runner with KVM and a real kernel available.
    # GitHub Actions hosted runners lack KVM so virtme-ng cannot launch a
    # real kernel on them. To run locally: ./scripts/ts.sh --no-tty 'bash scripts/run-tests-vng.sh'
    # Tracked at: https://github.com/parttimenerd/hello-ebpf/issues/31
    if: github.repository_owner == 'parttimenerd'
    name: Run tests on pre-built kernel
    runs-on: [self-hosted, linux, thinkstation]
    needs: build
    timeout-minutes: 10
    strategy:
      matrix:
        version: ["6.14"]
    env:
      HBT_KERNEL_VERSION: "${{ matrix.version }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'adopt'

      - run: sudo pip3 install https://github.com/amluto/virtme/archive/beb85146cd91de37ae455eccb6ab67c393e6e290.zip
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-system-x86 linux-headers-$(uname -r) linux-cloud-tools-generic gcc-multilib

      - name: Test
        run: |
          ./mvnw -ntp -B test -Djvm=testutil/bin/java

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          check_name: 'Test Report (Kernel ${{ matrix.KERNEL_VERSION }})'
          report_paths: '**/build/test-results/test/TEST-*.xml'
